volumes:
  mxl-domain:
    driver: local
    driver_opts:
      type: none
      device: /Volumes/mxl/domain_1
      o: "bind,nosuid,strictatime"
services:
  writer-media-function:
    image: ghcr.io/cbcrc/mxl-writer:mxl-d262152
    platform: linux/amd64
    # user: 1000:1000
    restart: unless-stopped
    volumes:
      - type: volume   # Maps the named volume "/mxl" (in memory) to /domain inside the container, in read-write mode.
        source: mxl-domain
        target: /domain
    command: ["/app/mxl-gst-testsrc", "-d", "/domain", "-v", "/app/v210_flow.json", "-t", "Original Flow"]
  
  clip-player-function:
    image: ghcr.io/cbcrc/mxl-clip-player:mxl-d262152
    platform: linux/amd64
    # user: 1000:1000
    restart: unless-stopped
    volumes:
      - type: volume   # Maps the named volume "/mxl" (in memory) to /domain inside the container, in read-write mode.
        source: mxl-domain
        target: /domain
      - ../../build-images/sizzle.ts:/app/sizzle.ts
    command: ["/app/mxl-gst-looping-filesrc", "-d", "/domain", "-i", "/app/sizzle.ts"]
  
  reader-media-function:
    image: ghcr.io/cbcrc/mxl-reader:mxl-d262152
    platform: linux/amd64
    # user: 1000:1000
    restart: unless-stopped
    volumes:
      - type: volume   # Maps the named volume "/mxl" (in memory) to /domain inside the container, in read-write mode.
        source: mxl-domain
        target: /domain
        read_only: true
    stdin_open: true
    tty: true
  
  mediamtx:
    platform: linux/amd64
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    hostname: mediamtx
    network_mode: host

  webrtc-player:
    platform: linux/amd64
    image: ghcr.io/cbcrc/mxl2webrtc:latest
    ports:
      - "9601:9600"
    volumes:
      - type: volume
        source: mxl-domain
        target: /domain
    environment:
      - MXL_DOMAIN=/domain
      - MEDIAMTX_WHIP_URL=http://host.docker.internal:8889/mxl2webrtc/whip
      - MEDIAMTX_WEBRTC_URL=http://localhost:8889
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx