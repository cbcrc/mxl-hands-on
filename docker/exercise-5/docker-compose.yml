# Creating the MXL domain volume
volumes:
  mxl-domain:
    driver: local
    driver_opts:
      type: none
      device: /Volumes/mxl/domain_1
      o: "bind,nosuid,strictatime"


services:
  # Setting up the Nmos Registry and dummy Nmos node:
  nmos-registry:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.nmos
    image: mxl-nmos-cpp:latest
    container_name: nmos-registry
    hostname: nmos-registry
    domainname: local
    ports:
    - "80:80"
    - "81:81"
    - "1883:1883"
    volumes:
    - "./data/registry.json:/home/registry.json"
    environment:
    - RUN_NODE=FALSE

  nmos-dummy-node:
    platform: linux/amd64
    image: mxl-nmos-cpp:latest
    container_name: nmos-dummy-node
    hostname: nmos-dummy-node
    domainname: local
    ports:
    - "8080:80"
    - "8081:81"
    volumes:
    - "./data/node.json:/home/node.json"
    environment:
    - RUN_NODE=TRUE
    depends_on:
    - nmos-registry