# Creating the MXL domain volume
volumes:
  mxl-domain:
    driver: local
    driver_opts:
      type: none
      device: /Volumes/mxl/domain_1
      o: "bind,nosuid,strictatime"


services:
  # Setting up the Nmos Registry and dummy Nmos node:
  nmos-registry:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.nmos
    image: mxl-nmos-cpp:latest
    container_name: nmos-registry
    hostname: nmos-registry
    domainname: local
    ports:
    - "80:80"
    - "81:81"
    - "1883:1883"
    volumes:
    - "./data/registry.json:/home/registry.json"
    environment:
    - RUN_NODE=FALSE

  nmos-dummy-node:
    platform: linux/amd64
    image: mxl-nmos-cpp:latest
    container_name: nmos-dummy-node
    hostname: nmos-dummy-node
    domainname: local
    ports:
    - "8080:80"
    - "8081:81"
    volumes:
    - "./data/node.json:/home/node.json"
    environment:
    - RUN_NODE=TRUE
    depends_on:
    - nmos-registry

  file-player:
    platform: linux/amd64
    build:
      # Build context is the repository root so the Dockerfile can access
      # dmf-mxl/build/ and dmf-mxl/rust/ for the MXL libraries.
      context: ../..
      dockerfile: docker/exercise-5/data/file-player/Dockerfile
    image: mxl-file-player:latest
    container_name: file-player
    hostname: file-player
    domainname: local
    ports:
    - "9500:9500"   # NMOS IS-04/IS-05 node
    - "9600:9600"   # FastAPI media-player backend
    - "9700:9700"   # React frontend (static files)
    volumes:
    - "./data/file-player/Clips:/home/file"   # media files
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MEDIA_DIR=/home/file
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9500
    depends_on:
    - nmos-registry