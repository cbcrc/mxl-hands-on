# Creating the MXL domain volume
volumes:
  mxl-domain:
    driver: local
    driver_opts:
      type: none
      device: /Volumes/mxl/domain_1
      o: "bind,nosuid,strictatime"


services:
  # Setting up the Nmos Registry and dummy Nmos node:
  nmos-registry:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.nmos
    image: mxl-nmos-cpp:latest
    container_name: nmos-registry
    hostname: nmos-registry
    domainname: local
    ports:
    - "80:80"
    - "81:81"
    - "1883:1883"
    volumes:
    - "./data/registry.json:/home/registry.json"
    environment:
    - RUN_NODE=FALSE

  file-player:
    platform: linux/amd64
    build:
      # Build context is the repository root so the Dockerfile can access
      # dmf-mxl/build/ and dmf-mxl/rust/ for the MXL libraries.
      context: ../..
      dockerfile: docker/exercise-5/data/file-player/Dockerfile
    image: mxl-file-player:latest
    container_name: file-player
    hostname: file-player
    domainname: local
    ports:
    - "9500:9500"   # NMOS IS-04/IS-05 node
    - "9600:9600"   # FastAPI media-player backend
    - "9700:9700"   # React frontend (static files)
    volumes:
    - "./data/file-player/Clips:/home/file"   # media files
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MEDIA_DIR=/home/file
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9500
    depends_on:
    - nmos-registry

  hls2mxl:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/exercise-5/data/hls2mxl/Dockerfile
    image: mxl-hls2mxl:latest
    container_name: hls2mxl
    hostname: hls2mxl
    domainname: local
    ports:
    - "9520:9520"   # NMOS IS-04/IS-05 node
    - "9620:9620"   # FastAPI hls2mxl backend
    - "9720:9720"   # React frontend (static files)
    volumes:
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9520
    depends_on:
    - nmos-registry

  test-generator:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/exercise-5/data/test-generator/Dockerfile
    image: mxl-test-generator:latest
    container_name: test-generator
    hostname: test-generator
    domainname: local
    ports:
    - "9510:9510"   # NMOS IS-04/IS-05 node
    - "9610:9610"   # FastAPI test-generator backend
    - "9710:9710"   # React frontend (static files)
    volumes:
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9510
    depends_on:
    - nmos-registry

  input-selector:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/exercise-5/data/input-selector/Dockerfile
    image: mxl-input-selector:latest
    container_name: input-selector
    hostname: input-selector
    domainname: local
    ports:
    - "9530:9530"   # NMOS IS-04/IS-05 node
    - "9630:9630"   # FastAPI input-selector backend
    - "9730:9730"   # React frontend (static files)
    volumes:
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9530
    depends_on:
    - nmos-registry

  html5-keyer:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/exercise-5/data/HTML5-keyer/Dockerfile
    image: mxl-html5-keyer:latest
    container_name: html5-keyer
    hostname: html5-keyer
    domainname: local
    ports:
    - "9540:9540"   # NMOS IS-04/IS-05 node
    - "9640:9640"   # FastAPI HTML5 Keyer backend
    - "9740:9740"   # React frontend (static files)
    shm_size: "256mb"                          # required for CEF multi-process IPC
    devices:
    - /dev/dri/renderD128:/dev/dri/renderD128  # AMD GPU for EGL/GBM rendering
    group_add:
    - "992"                                    # render GID — grants access to renderD128
    volumes:
    - "mxl-domain:/mxl-domain"               # shared MXL domain
    environment:
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9540
    - SPX_URL=http://spx-server:5660/renderer/
    depends_on:
    - nmos-registry
    - spx-server

  mxl2webrtc:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/exercise-5/data/mxl2webrtc/Dockerfile
    image: mxl-mxl2webrtc:latest
    container_name: mxl2webrtc
    hostname: mxl2webrtc
    domainname: local
    ports:
    - "9550:9550"   # NMOS IS-04/IS-05 node
    - "9650:9650"   # FastAPI mxl2webrtc backend
    - "9750:9750"   # React frontend (static files)
    - "8443:8443"   # webrtcsink signaling server
    - "50000-50020:50000-50020/udp"   # WebRTC media transport
    volumes:
    - "mxl-domain:/mxl-domain"
    environment:
    - MXL_DOMAIN=/mxl-domain
    - NMOS_NODE_URL=http://localhost:9550
    depends_on:
    - nmos-registry

  spx-server:
    image: spx-server:v1.0.3
    container_name: spx-server
    hostname: spx-server
    domainname: local
    ports:
    - "5660:5660"
    volumes:
    - ./data/spx-server/ASSETS:/app/ASSETS
    - ./data/spx-server/DATAROOT:/app/DATAROOT
    - ./data/spx-server/locales:/app/locales
    - ./data/spx-server/config.docker.json:/app/config.json
    - ./data/spx-server/bin:/app/bin
    - ./data/spx-server/LOG:/app/LOG
    restart: unless-stopped