name: gst-apps

# the device must point to a directory on the host that contains
# domain_def.json
volumes:
  mxl-domain:
    driver: local
    driver_opts:
      type: none
      device: /Volumes/mxl/domain_1
      o: "bind,nosuid,strictatime"

services:
  test-generator:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/test-generator/Dockerfile
    image: test-generator:latest
    container_name: test-generator
    hostname: test-generator
    domainname: local
    ports:
      - "9600:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain

  file-player:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/file-player/Dockerfile
    image: file-player:latest
    container_name: file-player
    hostname: file-player
    domainname: local
    ports:
      - "9602:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
      - ${MEDIA_DEVICE}:/home/file:ro
    environment:
      - MXL_DOMAIN=/mxl-domain

  mxl-info-gui:
      platform: linux/amd64
      build:
        context: ..
        dockerfile: gst-apps/mxl-info-gui/Dockerfile
      image: mxl-info-gui:latest
      container_name: mxl-info-gui
      hostname: mxl-info-gui
      domainname: local
      ports:
      - "9699:9600"   # FastAPI serves both API and React frontend
      volumes:
        - type: volume
          source: mxl-domain
          target: /mxl-domain
      environment:
      - MXL_DOMAIN=/mxl-domain

  hls2mxl:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/hls2mxl/Dockerfile
    image: hls2mxl:latest
    container_name: hls2mxl
    hostname: hls2mxl
    domainname: local
    ports:
      - "9603:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    environment:
      - MXL_DOMAIN=/mxl-domain

  input-selector:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/input-selector/Dockerfile
    image: input-selector:latest
    container_name: input-selector
    hostname: input-selector
    domainname: local
    ports:
      - "9604:9600"   # Rust backend serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    environment:
      - MXL_DOMAIN=/mxl-domain
      # Number of selectable input slots (UI + router). Override per deployment.
      - MAX_INPUTS=${INPUT_SELECTOR_MAX_INPUTS:-3}

  html5-keyer:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/HTML5-keyer/Dockerfile
    image: html5-keyer:latest
    container_name: html5-keyer
    hostname: html5-keyer
    domainname: local
    ports:
      - "9605:9600"   # FastAPI serves both API and React frontend
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    environment:
      - MXL_DOMAIN=/mxl-domain
    # CEF/Chromium launches multiple helper processes; bump shared memory so it
    # does not crash on the default 64 MB /dev/shm.
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # MediaMTX must use host networking so WebRTC ICE candidates reflect the real
  # host IP.  All ports (8554 RTSP, 8889 WebRTC) are bound directly on the host.
  mediamtx:
    platform: linux/amd64
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    hostname: mediamtx
    network_mode: host

  # ── mxl2webrtc ────────────────────────────────────────────────────────────
  # Two WebRTC delivery modes, chosen at runtime from the UI ("Use MediaMTX relay"):
  #   • MediaMTX relay  – publishes via WHIP to the (host-networked) mediamtx service.
  #                       Encodes once and fans out to many viewers. Works everywhere.
  #   • Direct WHEP     – the app is its own WebRTC server (lowest latency, intra-refresh),
  #                       best for a few viewers (it encodes once per viewer).
  #
  # This single bridged config covers every use:
  #   - MediaMTX mode needs nothing here — the browser talks to the mediamtx service.
  #   - Direct mode publishes the ICE UDP range 1:1 (WEBRTC_ICE_PORT_MIN..MAX); the host
  #     candidate address is rewritten per request to the host the browser connected to,
  #     so it works for both local AND remote viewers, on any platform — no override needed.
  mxl2webrtc:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: gst-apps/mxl2webrtc/Dockerfile
    image: mxl2webrtc:latest
    container_name: mxl2webrtc
    hostname: mxl2webrtc
    domainname: local
    ports:
      - "9601:9600"                  # FastAPI serves both API and React frontend
      - "8200-8210:8200-8210/udp"    # Direct-mode WebRTC ICE (one UDP port per viewer; 8189 is taken by mediamtx)
    volumes:
      - type: volume
        source: mxl-domain
        target: /mxl-domain
    environment:
      - MXL_DOMAIN=/mxl-domain
      # host.docker.internal resolves to the Docker bridge gateway on Linux when
      # extra_hosts is set; mediamtx binds directly on the host via network_mode: host
      - MEDIAMTX_WHIP_URL=http://host.docker.internal:8889/mxl2webrtc/whip
      - MEDIAMTX_WEBRTC_URL=http://localhost:8889
      # Direct-mode ICE: pin the UDP ports to the published range above (one per viewer).
      - WEBRTC_ICE_PORT_MIN=8200
      - WEBRTC_ICE_PORT_MAX=8210
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx
